<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music UI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>SONIQ</h2>
        <ul>
            <li>🏠 Home</li>
            <li>🔍 Search</li>
            <li>📁 Library</li>
            <li>❤️ Liked</li>
            <li>➕ Playlist</li>
        </ul>
    </aside>

    <!-- Main -->
    <main class="main">

        <!-- Hero -->
        <section class="hero">
            <div class="hero-content">
                <h4>FEATURED ALBUM</h4>
                <h1>Neon</h1>
                <p>The Midnight</p>
                <button>▶ PLAY</button>
            </div>
        </section>

        <!-- Trending -->
        <section class="trending">
            <h3>Trending Now</h3>

            <div class="albums">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1494232410401-ad00d5433cfa">
                    <h4>Album 1</h4>
                    <p>Artist Name</p>
                </div>

                <div class="card">
                    <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4">
                    <h4>Album 2</h4>
                    <p>Artist Name</p>
                </div>

                <div class="card">
                    <img src="https://images.unsplash.com/photo-1507874457470-272b3c8d8ee2">
                    <h4>Album 3</h4>
                    <p>Artist Name</p>
                </div>
            </div>
        </section>

    </main>

</div>

<script src="script.js"></script>
</body>
</html>
